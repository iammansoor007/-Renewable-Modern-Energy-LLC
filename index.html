<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renewable Modern Energy LLC | Solar Detach &amp; Reinstall Experts</title>
    <meta
      name="description"
      content="Renewable Modern Energy LLC specializes in certified solar panel detach, reinstall, racking, and estimate generation for homeowners and roofing contractors in Dallas, TX."
    />

    <!-- Direct High-Priority Local Font Preloads — Eliminates FOUT / Font Swapping completely -->
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-500-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- Preload hero background image to prevent color flash on hard reload -->
    <link
      rel="preload"
      href="/src/assets/hero-bg.png"
      as="image"
      fetchpriority="high"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
